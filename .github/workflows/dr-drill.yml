name: Disaster Recovery Drill

on:
  schedule:
    # Run quarterly on the first Sunday of January, April, July, October at 2 AM UTC
    - cron: '0 2 1-7 1,4,7,10 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for DR drill'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      drill_type:
        description: 'Type of DR drill'
        required: true
        default: 'full-failover'
        type: choice
        options: [full-failover, partial-data-loss, corruption-recovery]

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  DR_TEST_DB: dr_test_recovery

jobs:
  # ============================================================================
  # Pre-Drill Setup
  # ============================================================================
  setup:
    name: DR Drill Setup
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      drill_id: ${{ steps.setup.outputs.drill_id }}
      start_time: ${{ steps.setup.outputs.start_time }}

    steps:
      - name: Generate drill ID
        id: setup
        run: |
          DRILL_ID="drill-$(date +%Y%m%d-%H%M%S)"
          echo "drill_id=$DRILL_ID" >> $GITHUB_OUTPUT
          echo "start_time=$(date -u +%s)" >> $GITHUB_OUTPUT
          echo "DR Drill ID: $DRILL_ID"

      - name: Create drill tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const drillId = '${{ steps.setup.outputs.drill_id }}';
            const environment = '${{ github.event.inputs.environment || 'staging' }}';
            const drillType = '${{ github.event.inputs.drill_type || 'full-failover' }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `DR Drill: ${drillId}`,
              body: `## Disaster Recovery Drill
              
              **Drill ID:** ${drillId}
              **Environment:** ${environment}
              **Type:** ${drillType}
              **Started:** ${new Date().toISOString()}

              ### Status
              - [ ] Setup complete
              - [ ] Backup verified
              - [ ] Restore initiated
              - [ ] Data validation complete
              - [ ] RTO/RPO measured
              - [ ] Post-drill review complete

              ### Notes
              Track progress and observations here.`,
              labels: ['disaster-recovery', 'drill', environment]
            });

  # ============================================================================
  # Full DR Drill - Complete Failover Simulation
  # ============================================================================
  dr-drill-full:
    name: Full DR Drill
    runs-on: ubuntu-latest
    needs: setup
    if: github.event.inputs.drill_type == 'full-failover' || github.event.inputs.drill_type == null
    environment: ${{ github.event.inputs.environment || 'staging' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client bc

      - name: Simulate data insertion
        run: |
          # Create test data
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -c "
            CREATE TABLE IF NOT EXISTS dr_test_data (
              id SERIAL PRIMARY KEY,
              drill_id VARCHAR(50),
              data TEXT,
              created_at TIMESTAMP DEFAULT NOW()
            );
            INSERT INTO dr_test_data (drill_id, data) 
            VALUES ('${{ needs.setup.outputs.drill_id }}', 'Test data for DR drill');
          "
          
          # Verify data exists
          COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -t -c "
            SELECT COUNT(*) FROM dr_test_data WHERE drill_id = '${{ needs.setup.outputs.drill_id }}';
          " | xargs)
          
          echo "Inserted $COUNT test records"

      - name: Create backup
        run: |
          BACKUP_FILE="/tmp/dr-drill-${{ needs.setup.outputs.drill_id }}.dump"
          
          PGPASSWORD=postgres pg_dump -h localhost -U postgres -d test_db -F c -f "$BACKUP_FILE"
          
          # Upload to S3
          aws s3 cp "$BACKUP_FILE" "s3://${{ secrets.S3_BACKUP_BUCKET }}/dr-drills/" \
            --metadata "drill-id=${{ needs.setup.outputs.drill_id }}"
          
          echo "backup_file=$BACKUP_FILE" >> $GITHUB_ENV

      - name: Simulate disaster - drop database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "DROP DATABASE test_db;"
          echo "Database dropped - simulating disaster"

      - name: Measure RTO - Start recovery
        run: |
          echo "recovery_start=$(date +%s.%N)" >> $GITHUB_ENV

      - name: Restore from backup
        run: |
          # Recreate database
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE test_db;"
          
          # Restore
          PGPASSWORD=postgres pg_restore -h localhost -U postgres -d test_db \
            --verbose --no-owner "$BACKUP_FILE" 2>&1 || true

      - name: Measure RTO - Complete
        run: |
          RECOVERY_END=$(date +%s.%N)
          RECOVERY_START=${{ env.recovery_start }}
          
          RTO=$(echo "$RECOVERY_END - $RECOVERY_START" | bc)
          RTO_MINUTES=$(echo "scale=2; $RTO / 60" | bc)
          
          echo "rto_seconds=$RTO" >> $GITHUB_ENV
          echo "rto_minutes=$RTO_MINUTES" >> $GITHUB_ENV
          echo "Recovery Time (RTO): ${RTO_MINUTES} minutes"

      - name: Validate restored data
        run: |
          # Check data integrity
          COUNT=$(PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -t -c "
            SELECT COUNT(*) FROM dr_test_data WHERE drill_id = '${{ needs.setup.outputs.drill_id }}';
          " | xargs)
          
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: Data not restored correctly"
            exit 1
          fi
          
          echo "Data validation passed: $COUNT records restored"
          echo "restored_count=$COUNT" >> $GITHUB_ENV

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/dr-drill-*.dump

  # ============================================================================
  # Generate DR Drill Report
  # ============================================================================
  generate-report:
    name: Generate DR Report
    runs-on: ubuntu-latest
    needs: [setup, dr-drill-full]
    if: always()
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Calculate total time
        run: |
          START=${{ needs.setup.outputs.start_time }}
          END=$(date -u +%s)
          TOTAL=$((END - START))
          TOTAL_MINUTES=$((TOTAL / 60))
          
          echo "total_seconds=$TOTAL" >> $GITHUB_ENV
          echo "total_minutes=$TOTAL_MINUTES" >> $GITHUB_ENV

      - name: Create drill report
        uses: actions/github-script@v7
        with:
          script: |
            const drillId = '${{ needs.setup.outputs.drill_id }}';
            const environment = '${{ github.event.inputs.environment || 'staging' }}';
            const drillType = '${{ github.event.inputs.drill_type || 'full-failover' }}';
            const rto = '${{ env.rto_minutes }}' || 'N/A';
            const totalTime = '${{ env.total_minutes }}';
            const status = '${{ needs.dr-drill-full.result }}';
            
            const report = `## DR Drill Report: ${drillId}
            
            ### Summary
            - **Drill ID:** ${drillId}
            - **Environment:** ${environment}
            - **Type:** ${drillType}
            - **Status:** ${status === 'success' ? 'PASSED' : 'FAILED'}
            - **Total Duration:** ${totalTime} minutes
            
            ### Metrics
            - **RTO (Recovery Time Objective):** ${rto} minutes
            - **Target RTO:** 240 minutes (4 hours)
            - **Target RPO:** 60 minutes (1 hour)
            
            ### Results
            ${status === 'success' ? 'All DR procedures executed successfully.' : 'DR drill encountered issues. Review logs for details.'}
            
            ### Recommendations
            Based on this drill:
            1. ${parseFloat(rto) < 120 ? 'RTO is well within target. Current procedures are efficient.' : 'Consider optimizing restore procedures to improve RTO.'}
            2. Document any issues encountered during the drill
            3. Update runbooks with lessons learned
            
            ### Next Steps
            - [ ] Review drill results with team
            - [ ] Update DR runbooks if needed
            - [ ] Schedule next drill (quarterly)`;
            
            // Update the tracking issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drill',
              state: 'open'
            });
            
            const drillIssue = issues.data.find(i => i.title.includes(drillId));
            if (drillIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: drillIssue.number,
                body: drillIssue.body + '\n\n' + report,
                state: 'closed'
              });
            }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-drill-${{ needs.setup.outputs.drill_id }}
          path: |
            /tmp/dr-drill-*.log
            /tmp/dr-drill-*.dump
          if-no-files-found: ignore

  # ============================================================================
  # Notify Stakeholders
  # ============================================================================
  notify:
    name: Notify Stakeholders
    runs-on: ubuntu-latest
    needs: [setup, dr-drill-full, generate-report]
    if: always()

    steps:
      - name: Send Slack notification
        run: |
          STATUS='${{ needs.dr-drill-full.result }}'
          COLOR=$([ "$STATUS" = "success" ] && echo "good" || echo "danger")
          
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"DR Drill Complete: ${{ needs.setup.outputs.drill_id }}\",
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"fields\": [
                  {\"title\": \"Environment\", \"value\": \"${{ github.event.inputs.environment || 'staging' }}\", \"short\": true},
                  {\"title\": \"Status\", \"value\": \"$STATUS\", \"short\": true},
                  {\"title\": \"RTO\", \"value\": \"${{ env.rto_minutes }} minutes\", \"short\": true},
                  {\"title\": \"Total Time\", \"value\": \"${{ env.total_minutes }} minutes\", \"short\": true}
                ]
              }]
            }" || true

name: Database Migrations

on:
    push:
        branches: [main]
        paths:
            - "Backend/prisma/**"
            - ".github/workflows/db-migrations.yml"
    pull_request:
        paths:
            - "Backend/prisma/**"
            - ".github/workflows/db-migrations.yml"
    workflow_dispatch:
        inputs:
            environment:
                description: "Target environment"
                required: true
                default: "staging"
                type: choice
                options: [staging, production]
            run_seed:
                description: "Run seed after migration"
                required: false
                default: false
                type: boolean

defaults:
    run:
        working-directory: ./Backend

env:
    NODE_VERSION: "20"

jobs:
    # ─── Validate migrations on every PR ───────────────────────────────────────
    validate:
        name: Validate Migrations
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: Backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

            - name: Validate schema
              run: npx prisma validate
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

            - name: Run migrations (dry-run via deploy)
              run: npx prisma migrate deploy
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

            - name: Check migration status
              run: npx prisma migrate status
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

            - name: Verify no schema drift
              run: |
                  STATUS=$(npx prisma migrate status 2>&1)
                  if echo "$STATUS" | grep -q "have not yet been applied"; then
                    echo "❌ Unapplied migrations detected"
                    exit 1
                  fi
                  echo "✅ Schema is in sync"
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    # ─── Test seed script ───────────────────────────────────────────────────────
    seed-test:
        name: Test Seed Script
        runs-on: ubuntu-latest
        needs: validate
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: seed_test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: Backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Apply migrations
              run: npx prisma migrate deploy
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seed_test_db

            - name: Run seed
              run: npm run db:seed
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seed_test_db
                  NODE_ENV: test

    # ─── Test rollback script ───────────────────────────────────────────────────
    rollback-test:
        name: Test Rollback Script
        runs-on: ubuntu-latest
        needs: validate
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: rollback_test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: Backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Apply migrations
              run: npx prisma migrate deploy
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rollback_test_db

            - name: List migrations
              run: npm run db:rollback:list
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rollback_test_db

            - name: Test rollback (1 step)
              run: npm run db:rollback -- --steps 1
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rollback_test_db
                  NODE_ENV: test

            - name: Re-apply after rollback
              run: npx prisma migrate deploy
              env:
                  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rollback_test_db

    # ─── Deploy to staging (on push to main) ───────────────────────────────────
    deploy-staging:
        name: Deploy Migrations (Staging)
        runs-on: ubuntu-latest
        needs: [validate, seed-test, rollback-test]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        environment: staging

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: Backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate
              env:
                  DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

            - name: Run pre-deploy checks
              run: npm run db:pre-deploy
              env:
                  DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

            - name: Deploy migrations
              run: npx prisma migrate deploy
              env:
                  DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

            - name: Verify migration status
              run: npx prisma migrate status
              env:
                  DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

    # ─── Deploy to production (manual trigger only) ────────────────────────────
    deploy-production:
        name: Deploy Migrations (Production)
        runs-on: ubuntu-latest
        needs: deploy-staging
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
        environment: production

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: Backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate
              env:
                  DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

            - name: Run pre-deploy checks
              run: npm run db:pre-deploy
              env:
                  DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

            - name: Deploy migrations (zero-downtime)
              run: npx prisma migrate deploy
              env:
                  DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

            - name: Verify migration status
              run: npx prisma migrate status
              env:
                  DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

            - name: Run seed (if requested)
              if: github.event.inputs.run_seed == 'true'
              run: npm run db:seed
              env:
                  DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
                  NODE_ENV: production
